{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb mb-0 small">
    <li class="breadcrumb-item"><a href="{{ url_for('clienti_lista') }}">Clienti</a></li>
    <li class="breadcrumb-item active">{{ title }}</li>
  </ol>
</nav>

<div class="card" style="max-width:560px">
  <div class="card-header">{{ title }}</div>
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Nome / Ragione sociale <span class="text-danger">*</span></label>
        <input type="text" name="nome" required class="form-control"
               value="{{ obj.nome if obj else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Codice cliente</label>
        <input type="text" name="codice" class="form-control"
               value="{{ obj.codice if obj else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Note</label>
        <textarea name="note" rows="3" class="form-control">{{ obj.note if obj else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Salva
        </button>
        <a href="{{ url_for('clienti_lista') }}" class="btn btn-outline-secondary">Annulla</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
